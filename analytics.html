<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Tap Study — Analytics</title>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Roboto', sans-serif;
      background: #0f1117;
      color: #e0e0e0;
      min-height: 100vh;
      padding: 40px 20px;
    }

    h1 {
      text-align: center;
      font-size: 1.8rem;
      font-weight: 600;
      color: #ffffff;
      margin-bottom: 8px;
    }

    .subtitle {
      text-align: center;
      font-size: 0.9rem;
      color: #888;
      margin-bottom: 40px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 24px;
      max-width: 1100px;
      margin: 0 auto;
    }

    .card {
      background: #1a1d27;
      border: 1px solid #2a2d3a;
      border-radius: 16px;
      padding: 28px;
    }

    .card h2 {
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1.2px;
      color: #888;
      margin-bottom: 20px;
    }

    .group {
      margin-bottom: 20px;
    }

    .group:last-child { margin-bottom: 0; }

    .group-label {
      font-size: 0.85rem;
      font-weight: 600;
      color: #a78bfa;
      margin-bottom: 10px;
      padding-bottom: 6px;
      border-bottom: 1px solid #2a2d3a;
    }

    .group-label.green { color: #34d399; }
    .group-label.blue  { color: #60a5fa; }
    .group-label.amber { color: #fbbf24; }

    .stat-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 6px 0;
    }

    .stat-label {
      font-size: 0.82rem;
      color: #9ca3af;
    }

    .stat-value {
      font-size: 0.95rem;
      font-weight: 600;
      color: #f3f4f6;
    }

    .stat-value span {
      font-size: 0.72rem;
      font-weight: 400;
      color: #6b7280;
      margin-left: 3px;
    }

    /* Completion bars */
    .completion-bar-wrap {
      margin-top: 8px;
    }

    .bar-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 10px;
    }

    .bar-label {
      font-size: 0.78rem;
      color: #9ca3af;
      width: 130px;
      flex-shrink: 0;
    }

    .bar-track {
      flex: 1;
      background: #2a2d3a;
      border-radius: 6px;
      height: 10px;
      overflow: hidden;
    }

    .bar-fill {
      height: 100%;
      border-radius: 6px;
      transition: width 0.8s ease;
    }

    .bar-fill.green  { background: #34d399; }
    .bar-fill.amber  { background: #fbbf24; }
    .bar-fill.red    { background: #f87171; }

    .bar-count {
      font-size: 0.78rem;
      color: #e0e0e0;
      width: 28px;
      text-align: right;
      flex-shrink: 0;
    }

    /* Loading / error */
    .status {
      text-align: center;
      font-size: 1rem;
      color: #6b7280;
      margin-top: 80px;
    }

    .status.error { color: #f87171; }

    .loader {
      display: inline-block;
      width: 32px;
      height: 32px;
      border: 3px solid #2a2d3a;
      border-top-color: #a78bfa;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-bottom: 12px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .updated {
      text-align: center;
      font-size: 0.75rem;
      color: #4b5563;
      margin-top: 32px;
    }
  </style>
</head>
<body>

  <h1>Tap Study Analytics</h1>
  <p class="subtitle">Live results from the tap speed experiment</p>

  <div id="root">
    <div class="status">
      <div class="loader"></div>
      <p>Loading analytics...</p>
    </div>
  </div>

  <p class="updated" id="updated"></p>

  <script>
    const API = "https://click-logger-backend2.vercel.app/analytics";

    function fmt(val, unit) {
      return `${val.toLocaleString()}<span>${unit}</span>`;
    }

    function statRow(label, value, unit = "") {
      return `
        <div class="stat-row">
          <span class="stat-label">${label}</span>
          <span class="stat-value">${fmt(value, unit)}</span>
        </div>`;
    }

    function deviceCard(data) {
      return `
        <div class="card">
          <h2>Query 1 - Device Performance</h2>
          <div class="group">
            <div class="group-label green">Android / Mobile</div>
            ${statRow("Total taps", data.android.totalTaps)}
            ${statRow("Mean duration", data.android.meanDuration, "ms")}
            ${statRow("Std deviation", data.android.stdDeviation, "ms")}
            ${statRow("Min", data.android.min, "ms")}
            ${statRow("Max", data.android.max, "ms")}
          </div>
          <div class="group">
            <div class="group-label blue">PC / Desktop</div>
            ${statRow("Total taps", data.pc.totalTaps)}
            ${statRow("Mean duration", data.pc.meanDuration, "ms")}
            ${statRow("Std deviation", data.pc.stdDeviation, "ms")}
            ${statRow("Min", data.pc.min, "ms")}
            ${statRow("Max", data.pc.max, "ms")}
          </div>
        </div>`;
    }

    function interfaceCard(data) {
      return `
        <div class="card">
          <h2>Query 2 - Interface Comparison</h2>
          <div class="group">
            <div class="group-label amber">With Feedback</div>
            ${statRow("Total taps", data.feedback.totalTaps)}
            ${statRow("Mean duration", data.feedback.meanDuration, "ms")}
            ${statRow("Std deviation", data.feedback.stdDeviation, "ms")}
            ${statRow("Min", data.feedback.min, "ms")}
            ${statRow("Max", data.feedback.max, "ms")}
          </div>
          <div class="group">
            <div class="group-label">No Feedback</div>
            ${statRow("Total taps", data.noFeedback.totalTaps)}
            ${statRow("Mean duration", data.noFeedback.meanDuration, "ms")}
            ${statRow("Std deviation", data.noFeedback.stdDeviation, "ms")}
            ${statRow("Min", data.noFeedback.min, "ms")}
            ${statRow("Max", data.noFeedback.max, "ms")}
          </div>
        </div>`;
    }

    function completionCard(data) {
      const total = data.totalUsers || 1;
      const pct = (v) => Math.round((v / total) * 100);

      return `
        <div class="card">
          <h2>Query 3 - User Completion</h2>
          <div class="stat-row" style="margin-bottom:20px">
            <span class="stat-label">Total participants</span>
            <span class="stat-value">${data.totalUsers}</span>
          </div>
          <div class="completion-bar-wrap">
            <div class="bar-row">
              <span class="bar-label">Completed both</span>
              <div class="bar-track">
                <div class="bar-fill green" style="width:${pct(data.completedBoth)}%"></div>
              </div>
              <span class="bar-count">${data.completedBoth}</span>
            </div>
            <div class="bar-row">
              <span class="bar-label">Dropped after R1</span>
              <div class="bar-track">
                <div class="bar-fill amber" style="width:${pct(data.droppedAfterFirst)}%"></div>
              </div>
              <span class="bar-count">${data.droppedAfterFirst}</span>
            </div>
          </div>
        </div>`;
    }

    async function load() {
      try {
        const res = await fetch(API);
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const d = await res.json();

        document.getElementById("root").innerHTML = `
          <div class="grid">
            ${deviceCard(d.devicePerformance)}
            ${interfaceCard(d.interfaceComparison)}
            ${completionCard(d.userCompletion)}
          </div>`;

        document.getElementById("updated").textContent =
          "Last updated: " + new Date().toLocaleTimeString();
      } catch (err) {
        document.getElementById("root").innerHTML =
          `<div class="status error">Failed to load analytics: ${err.message}</div>`;
      }
    }

    load();
  </script>

</body>
</html>
